<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NalamAI Health Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark:  #0A1628;
            --navy-mid:   #0D1F35;
            --navy-light: #0A1E32;
            --teal:       #0D9488;
            --teal-light: #14B8A6;
            --teal-pale:  #CCFBF1;
            --border:     #1E3A5F;
            --text-main:  #CBD5E1;
            --text-muted: #94A3B8;
            --white:      #FFFFFF;
            --red:        #EF4444;
            --green:      #22C55E;
            --orange:     #F97316;
            --blue:       #3B82F6;
            --purple:     #8B5CF6;
            --gold:       #F59E0B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--navy-dark);
            font-family: 'DM Sans', 'Noto Sans Tamil', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 720px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--navy-dark);
        }

        /* SECTION A — HEADER */
        .header {
            background: linear-gradient(135deg, #0D9488, #065F46);
            border-radius: 16px 16px 0 0;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-title-box { }
        .header-title { color: white; font-weight: bold; font-size: 17px; }
        .header-subtitle { color: #CCFBF1; font-size: 11px; font-family: 'Noto Sans Tamil', sans-serif; }

        .header-right {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 4px 12px;
            gap: 6px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ADE80;
            animation: pulse 2s infinite;
        }

        .online-text { color: white; font-size: 11px; }

        /* SECTION B — TOOLBAR */
        .toolbar {
            background: var(--navy-light);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .lang-label { color: var(--text-muted); font-size: 11px; }
        .lang-pill {
            background: var(--navy-dark);
            border-radius: 20px;
            padding: 3px;
            display: flex;
            gap: 2px;
        }

        .lang-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            border-radius: 16px;
            padding: 3px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--teal);
            color: white;
        }

        .voice-btn {
            border: 1px solid var(--border);
            background: var(--navy-dark);
            color: var(--text-muted);
            border-radius: 20px;
            padding: 5px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .voice-btn:hover { border-color: var(--teal); color: var(--teal); }
        .voice-btn.listening {
            background: var(--red);
            border-color: var(--red);
            color: white;
            animation: voicePulse 1s infinite;
        }

        .voice-status { color: #4B7A9A; font-size: 11px; margin-left: auto; }

        /* SECTION C — DISEASE TAG BAR */
        .disease-tags {
            background: #0D1626;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding: 8px 14px;
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }

        /* SECTION D — MESSAGES AREA */
        .messages {
            id: messages;
            background: var(--navy-dark);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            height: 380px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .msg-row { display: flex; align-items: flex-start; gap: 10px; }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .msg-avatar.bot { background: linear-gradient(135deg,#0D9488,#065F46); border: 2px solid #0D9488; }
        .msg-avatar.user { background: #1E3A5F; }

        .msg-bubble {
            max-width: 78%;
            padding: 11px 15px;
            font-size: 13.5px;
            line-height: 1.65;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .msg-bubble.bot {
            background: var(--navy-mid);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
        }

        .msg-bubble.user {
            background: linear-gradient(135deg,#0D9488,#0F766E);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }

        .typing-row { display: flex; align-items: center; gap: 10px; }
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: var(--navy-mid);
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); }
        .dot:nth-child(1) { animation: bounce 1.2s 0s infinite; }
        .dot:nth-child(2) { animation: bounce 1.2s 0.2s infinite; }
        .dot:nth-child(3) { animation: bounce 1.2s 0.4s infinite; }

        /* SECTION E — QUICK QUESTIONS BAR */
        .quick-q {
            background: #0D1626;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .quick-btn {
            background: var(--navy-dark);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 20px;
            padding: 4px 11px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover { border-color: var(--teal); color: var(--teal); }

        /* SECTION F — INPUT BAR */
        .input-bar {
            background: var(--navy-mid);
            border-radius: 0 0 16px 16px;
            border: 1px solid var(--border);
            border-top: 1px solid var(--teal);
            padding: 10px 14px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .input-area {
            flex: 1;
            background: var(--navy-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 9px 13px;
            color: #E2E8F0;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            resize: none;
            outline: none;
            line-height: 1.5;
            min-height: 44px;
        }

        .input-area:focus { border-color: var(--teal); }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #1E3A5F;
            cursor: not-allowed;
            opacity: 0.5;
            color: white;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn.enabled {
            background: linear-gradient(135deg,#0D9488,#065F46);
            cursor: pointer;
            opacity: 1;
        }

        .send-btn.enabled:hover { transform: scale(1.08); }

        /* SECTION G — DISCLAIMER */
        .disclaimer {
            text-align: center;
            color: #4B7A9A;
            font-size: 10.5px;
            margin-top: 8px;
            padding-bottom: 8px;
        }

        .ambulance-red { color: var(--red); font-weight: bold; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--navy-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
        @keyframes voicePulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- SECTION A — HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">🏥</div>
            <div class="header-title-box">
                <div class="header-title">NalamAI Health Assistant</div>
                <div class="header-subtitle">நலம் AI • Tamil Nadu Disease Guidance Bot</div>
            </div>
        </div>
        <div class="header-right">
            <div class="online-dot"></div>
            <div class="online-text">Online</div>
        </div>
    </div>

    <!-- SECTION B — TOOLBAR -->
    <div class="toolbar">
        <span class="lang-label">Language:</span>
        <div class="lang-pill">
            <button id="btn-en" class="lang-btn active" onclick="setLang('en')">English</button>
            <button id="btn-ta" class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
        </div>
        <button id="voiceBtn" class="voice-btn" onclick="toggleVoice()">
            <span id="voiceIcon">🎤</span>
            <span id="voiceLabel">Speak Symptoms</span>
        </button>
        <span id="voiceStatus" class="voice-status"></span>
    </div>

    <!-- SECTION C — DISEASE TAG BAR -->
    <div id="diseaseTags" class="disease-tags"></div>

    <!-- SECTION D — MESSAGES AREA -->
    <div id="messages" class="messages"></div>

    <!-- SECTION E — QUICK QUESTIONS BAR -->
    <div id="quickQ" class="quick-q"></div>

    <!-- SECTION F — INPUT BAR -->
    <div class="input-bar">
        <textarea id="inputArea" class="input-area" rows="2" placeholder="Describe symptoms or ask about dengue, malaria..." onkeydown="handleKey(event)" oninput="updateSendBtn()"></textarea>
        <button id="sendBtn" class="send-btn" onclick="sendMessage()" disabled>➤</button>
    </div>

    <!-- SECTION G — DISCLAIMER -->
    <div class="disclaimer">
        ⚕️ General health guidance only — not medical diagnosis. Always consult a qualified doctor.<br>
        🚨 Emergency? Call <span class="ambulance-red">108</span> (Tamil Nadu Ambulance — Free)
    </div>
</div>

<script>
    // PART 4 — JAVASCRIPT DATA
    const DISEASE_DATA = {
      dengue: {
        en: {
          keywords: ["dengue", "dengue fever", "high fever", "rash", "pain behind eyes", "joint pain", "mosquito bite", "platelet"],
          response: `🦟 **DENGUE FEVER — Guidance**\n\n**Early Symptoms (காய்ச்சல் — Fever):**\n• Sudden high fever (104°F / 40°C)\n• Severe headache (தலைவலி) and pain behind the eyes\n• Intense joint and muscle pain (called "Breakbone fever")\n• Skin rash appearing 2-5 days after fever starts\n• Nausea, vomiting, fatigue\n• Mild bleeding from gums or nose\n\n**Home Care Precautions:**\n• Rest completely — do not go to school/work\n• Drink 3-4 litres of fluids daily: water, coconut water, ORS, fruit juice\n• Take Paracetamol ONLY for fever — NEVER take Aspirin or Ibuprofen (they can cause bleeding)\n• Apply cool wet cloth on forehead to bring down fever\n• Wear full-sleeve clothes to prevent more mosquito bites\n• Sleep under mosquito net always\n• Eat light food: porridge, rice kanji, soups\n\n**What Doctors Typically Prescribe (Early Stage):**\n• Paracetamol (Crocin / Dolo 650) for fever\n• Oral rehydration salts (ORS) for hydration\n• Blood tests: CBC test to check platelet count\n• Anti-emetics if vomiting is severe\n• Vitamin C supplements\n\n**DANGER SIGNS — Go to Hospital IMMEDIATELY:**\n🚨 Severe abdominal pain\n🚨 Continuous vomiting (more than 3 times)\n🚨 Blood in vomit, urine, or stool\n🚨 Platelet count below 100,000\n🚨 Difficulty breathing\n🚨 Sudden weakness or dizziness\n\n**Prevention for Your Family:**\n• Remove all stagnant water from flower pots, tyres, coolers\n• Use mosquito nets and repellents\n• Keep water tanks fully covered\n• Use mosquito coils/mats in evenings\n• Community fogging during outbreak season\n\n⚠️ Please consult a qualified doctor for proper diagnosis. This is general guidance only. Emergency: 108`
        },
        ta: {
          keywords: ["டெங்கு", "காய்ச்சல்", "தலைவலி", "மூட்டு வலி", "கொசு", "ரணம்"],
          response: `🦟 **டெங்கு காய்ச்சல் — வழிகாட்டல்**\n\n**ஆரம்ப அறிகுறிகள்:**\n• திடீர் அதிக காய்ச்சல் (40°C / 104°F)\n• கடுமையான தலைவலி மற்றும் கண்களுக்கு பின்னால் வலி\n• மூட்டு மற்றும் தசை வலி (மிகவும் கடுமையாக இருக்கும்)\n• 2-5 நாட்களில் சருமத்தில் சிவந்த படை\n• குமட்டல், வாந்தி, களைப்பு\n• ஈறு அல்லது மூக்கிலிருந்து சிறிது இரத்தம்\n\n**வீட்டு பராமரிப்பு முன்னெச்சரிக்கைகள்:**\n• முழு ஓய்வு எடுங்கள் — பள்ளி அல்லது வேலைக்கு செல்லாதீர்கள்\n• தினமும் 3-4 லிட்டர் திரவம் குடிக்கவும்: தண்ணீர், தேங்காய் தண்ணீர், ORS\n• காய்ச்சலுக்கு Paracetamol மட்டுமே எடுக்கவும் — Aspirin வேண்டாம்\n• காய்ச்சலை குறைக்க நெற்றியில் குளிர்ந்த துணி வையுங்கள்\n• மேலும் கொசு கடிக்காமல் இருக்க முழு கை உடை அணியுங்கள்\n• கொசு வலையில் தூங்குங்கள்\n• இலேசான உணவு சாப்பிடுங்கள்: கஞ்சி, சூப்\n\n**மருத்துவர்கள் பொதுவாக என்ன கொடுப்பார்கள்:**\n• Paracetamol (Crocin / Dolo 650) காய்ச்சலுக்கு\n• ORS நீர்ப்பூர்த்திக்கு\n• இரத்த பரிசோதனை: platelet எண்ணிக்கை சரிபார்க்க\n• வாந்தி அதிகமாக இருந்தால் Anti-emetics\n\n**உடனடியாக மருத்துவமனை செல்ல வேண்டிய அறிகுறிகள்:**\n🚨 கடுமையான வயிற்று வலி\n🚨 தொடர்ச்சியான வாந்தி (3 முறைக்கும் மேல்)\n🚨 வாந்தி, சிறுநீர் அல்லது மலத்தில் இரத்தம்\n🚨 Platelet 100,000-க்கும் கீழ் இறங்கினால்\n🚨 மூச்சு திணறல்\n\n**குடும்பத்தை பாதுகாக்க:**\n• தேங்கும் தண்ணீரை அகற்றுங்கள்\n• கொசு வலை, repellent பயன்படுத்துங்கள்\n• தண்ணீர் தொட்டிகளை மூடி வையுங்கள்\n\n⚠️ சரியான நோய் கண்டறிதலுக்கு மருத்துவரை அணுகவும். இது பொது வழிகாட்டல் மட்டுமே. அவசரநிலை: 108`
        }
      },
      cholera: {
        en: {
          keywords: ["cholera", "watery diarrhea", "diarrhea", "loose motion", "vomiting", "dehydration", "rice water stool"],
          response: `💧 **CHOLERA — Guidance**\n\n**Early Symptoms:**\n• Sudden profuse watery diarrhea (like "rice water")\n• Rapid vomiting\n• Severe dehydration — sunken eyes, dry mouth, no urination\n• Muscle cramps (especially in legs)\n• Low blood pressure, rapid heart rate\n• Usually NO fever (unlike dengue)\n\n**Home Care — Most Important: ORS**\n• Start Oral Rehydration Solution (ORS) IMMEDIATELY\n• Make ORS at home: 1 litre clean water + 6 teaspoons sugar + 1/2 teaspoon salt\n• Give small sips every 5 minutes continuously\n• Do NOT stop drinking even if vomiting — keep sipping slowly\n• Drink coconut water, rice water, banana stem juice\n• If baby has diarrhea: continue breastfeeding\n\n**What Doctors Typically Prescribe:**\n• ORS sachets (Electral / Jeevan Jal) — available free at PHCs\n• Oral Zinc tablets for children\n• Antibiotics: Doxycycline or Azithromycin (in severe cases)\n• IV fluids if severely dehydrated\n\n**DANGER SIGNS — Go to Hospital IMMEDIATELY:**\n🚨 No urination for 6+ hours\n🚨 Cannot keep any fluid down\n🚨 Sunken eyes, dry skin that stays pinched\n🚨 Rapid weak pulse\n🚨 Child becomes unconscious or very lethargic\n\n**Prevention:**\n• Drink only boiled or filtered water\n• Wash hands with soap before eating and after toilet\n• Eat freshly cooked hot food only\n• Avoid street food during outbreak\n• Boil drinking water for at least 1 minute\n\n⚠️ Please consult a qualified doctor. Emergency: 108`

    function initVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        const btn = document.getElementById('voiceBtn');
        btn.style.opacity = '0.4';
        btn.title = 'Voice not supported. Please use Chrome browser.';
        btn.onclick = () => alert('Voice input requires Chrome browser. Please open this page in Google Chrome.');
        return;
      }
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-IN';

      recognition.onstart = () => {
        isListening = true;
        const btn = document.getElementById('voiceBtn');
        btn.classList.add('listening');
        document.getElementById('voiceIcon').textContent = '🎙️';
        document.getElementById('voiceLabel').textContent = currentLang === 'ta' ? 'கேட்கிறேன்...' : '🎙️ Listening...';
        document.getElementById('voiceStatus').textContent = currentLang === 'ta' ? 'பேசுங்கள்...' : 'Speak now...';
      };

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('inputArea').value = transcript;
        updateSendBtn();
      };

      recognition.onend = () => {
        isListening = false;
        const btn = document.getElementById('voiceBtn');
        btn.classList.remove('listening');
        document.getElementById('voiceIcon').textContent = '🎤';
        document.getElementById('voiceLabel').textContent = currentLang === 'ta' ? 'பேசி சொல்லுங்கள்' : 'Speak Symptoms';
        document.getElementById('voiceStatus').textContent = '';
        const text = document.getElementById('inputArea').value.trim();
        if (text) {
          setTimeout(() => sendMessage(), 300);
        }
      };

      recognition.onerror = (event) => {
        isListening = false;
        document.getElementById('voiceBtn').classList.remove('listening');
        document.getElementById('voiceIcon').textContent = '🎤';
        document.getElementById('voiceLabel').textContent = currentLang === 'ta' ? 'பேசி சொல்லுங்கள்' : 'Speak Symptoms';
        const errorMessages = {
          'no-speech': currentLang === 'ta' ? 'பேச்சு கேட்கவில்லை. மீண்டும் முயற்சிக்கவும்.' : 'No speech detected. Try again.',
          'not-allowed': 'Microphone blocked. Allow mic access in browser settings.',
          'network': 'Network error for voice. Try again.'
        };
        document.getElementById('voiceStatus').textContent = errorMessages[event.error] || 'Error: ' + event.error;
        setTimeout(() => { document.getElementById('voiceStatus').textContent = ''; }, 3000);
      };
    }

    function toggleVoice() {
      if (!recognition) {
        alert('Voice input requires Chrome browser. Please open in Google Chrome.');
        return;
      }
      if (isListening) {
        recognition.stop();
      } else {
        recognition.lang = currentLang === 'ta' ? 'ta-IN' : 'en-IN';
        try {
          recognition.start();
        } catch(e) {
          document.getElementById('voiceStatus').textContent = 'Click mic again to retry';
          setTimeout(() => { document.getElementById('voiceStatus').textContent = ''; }, 2000);
        }
      }
    }

    function sendMessage(override) {
      const text = override || document.getElementById('inputArea').value.trim();
      if (!text || isLoading) return;

      document.getElementById('inputArea').value = '';
      isLoading = true;
      updateSendBtn();
      addMessage('user', text);
      showTyping();

      setTimeout(() => {
        removeTyping();
        const response = getSmartResponse(text);
        if (response) {
          addMessage('assistant', response);
        }
        isLoading = false;
        updateSendBtn();
      }, 700);
    }
